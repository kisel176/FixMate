<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixMate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'fixmate/css/ai.css' %}">
</head>
<body>
    <div class="container">
        <!-- Sidebar - Chat List -->
        <div class="chat-sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">&lt;/&gt;</div>
                    <span class="logo-text">FixMate</span>
                </div>
                <button class="new-chat-btn" id="newChatBtn">
                    <i class="fas fa-plus"></i> Новый чат
                </button>
            </div>

            <div class="chat-list" id="chatList">
                <!-- Чаты будут динамически добавляться сюда -->
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Chat Header -->
            <div class="chat-header">
                <div class="chat-info">
                    <i class="fas fa-comments" style="color: #667eea;"></i>
                    <h2 id="currentChatName">Новый чат</h2>
                </div>
                <div class="chat-actions-header">
                    <button class="icon-btn" id="switchChatBtn" title="Переключить чат">
                        <i class="fas fa-exchange-alt"></i>
                    </button>
                    <button class="icon-btn" id="deleteChatBtn" title="Удалить чат">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            </div>

            <!-- Code Section -->
            <div class="code-section">
                <div class="code-header">
                    <span class="code-title"><i class="fas fa-code"></i> КОД ДЛЯ АНАЛИЗА</span>
                    <div class="language-selector" id="languageSelector">
                        <button class="lang-btn active" data-lang="python">Python</button>
                        <button class="lang-btn" data-lang="javascript">JS</button>
                        <button class="lang-btn" data-lang="java">Java</button>
                        <button class="lang-btn" data-lang="cpp">C++</button>
                    </div>
                </div>
                <div class="code-editor-container">
                    <div class="editor-header">
                        <span class="filename" id="filename">main.py</span>
                        <div>
                            <button class="icon-btn" id="clearCodeBtn" style="font-size: 12px;" title="Очистить">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                    </div>
                    <textarea
                        class="code-editor"
                        id="codeEditor"
                        placeholder='# Напишите или вставьте код для анализа...'
                    ></textarea>
                </div>
                <div class="code-actions">
                    <button class="btn-small icon-btn" id="analyzeCodeBtn">
                        <i class="fas fa-brain"></i> Анализировать
                    </button>
                    <button class="btn-small icon-btn" id="attachCodeBtn">
                        <i class="fas fa-paperclip"></i> Прикрепить код
                    </button>
                </div>
            </div>

            <!-- Chat Messages -->
            <div class="chat-messages" id="chatMessages">
                <div class="message">
                    <div class="message-avatar">🤖</div>
                    <div class="message-content">
                        <p>Привет! Я AI ассистент для анализа кода.</p>
                        <p>Загрузите код, и я помогу найти ошибки, оптимизировать и улучшить его.</p>
                        <div class="message-time">только что</div>
                    </div>
                </div>
            </div>

            <!-- Chat Input -->
            <div class="chat-input-container">
                <div class="input-wrapper">
                    <input
                        type="text"
                        class="chat-input"
                        placeholder="Спросите о коде, попросите объяснить или улучшить..."
                        id="chatInput"
                        onkeypress="handleKeyPress(event)"
                    >
                    <button class="send-btn" id="sendBtn">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal для переключения чатов -->
    <div class="modal" id="chatModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-comments"></i> Переключение чатов</h3>
                <button class="modal-close" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="chat-list-modal" id="chatListModal">
                    <!-- Список чатов будет здесь -->
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-modal btn-modal-secondary" id="cancelModalBtn">Отмена</button>
            </div>
        </div>
    </div>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script>
        // Модель чата
        class Chat {
            constructor(id, name, createdAt) {
                this.id = id;
                this.name = name;
                this.createdAt = createdAt || new Date();
                this.messages = [];
                this.code = '';
                this.language = 'python';
            }
        }

        // Управление чатами
        class ChatManager {
            constructor() {
                this.chats = [];
                this.currentChatId = null;
                this.loadFromStorage();
                if (this.chats.length === 0) {
                    this.createNewChat();
                }
                this.currentChatId = this.chats[0].id;
            }

            loadFromStorage() {
                const saved = localStorage.getItem('ai_code_chats');
                if (saved) {
                    const data = JSON.parse(saved);
                    this.chats = data.chats.map(c => {
                        const chat = new Chat(c.id, c.name, new Date(c.createdAt));
                        chat.messages = c.messages || [];
                        chat.code = c.code || '';
                        chat.language = c.language || 'python';
                        return chat;
                    });
                    this.currentChatId = data.currentChatId;
                }
            }

            saveToStorage() {
                localStorage.setItem('ai_code_chats', JSON.stringify({
                    chats: this.chats,
                    currentChatId: this.currentChatId
                }));
            }

            createNewChat() {
                const id = Date.now().toString();
                const name = `Чат ${this.chats.length + 1}`;
                const chat = new Chat(id, name);
                chat.messages.push({
                    id: Date.now(),
                    role: 'assistant',
                    content: 'Привет! Я AI ассистент для анализа кода.\n\nЗагрузите код, и я помогу найти ошибки, оптимизировать и улучшить его.',
                    timestamp: new Date()
                });
                this.chats.unshift(chat);
                this.currentChatId = chat.id;
                this.saveToStorage();
                return chat;
            }

            getCurrentChat() {
                return this.chats.find(c => c.id === this.currentChatId);
            }

            switchChat(chatId) {
                const chat = this.chats.find(c => c.id === chatId);
                if (chat) {
                    this.currentChatId = chatId;
                    this.saveToStorage();
                    return chat;
                }
                return null;
            }

            deleteChat(chatId) {
                const index = this.chats.findIndex(c => c.id === chatId);
                if (index !== -1) {
                    this.chats.splice(index, 1);
                    if (this.chats.length === 0) {
                        this.createNewChat();
                    }
                    if (this.currentChatId === chatId) {
                        this.currentChatId = this.chats[0].id;
                    }
                    this.saveToStorage();
                    return true;
                }
                return false;
            }

            addMessage(chatId, message) {
                const chat = this.chats.find(c => c.id === chatId);
                if (chat) {
                    chat.messages.push(message);
                    this.saveToStorage();
                    return true;
                }
                return false;
            }

            updateCode(chatId, code, language) {
                const chat = this.chats.find(c => c.id === chatId);
                if (chat) {
                    chat.code = code;
                    chat.language = language;
                    this.saveToStorage();
                }
            }

            getChatsList() {
                return this.chats.map(c => ({
                    id: c.id,
                    name: c.name,
                    preview: c.messages.length > 0 ? c.messages[c.messages.length - 1].content.substring(0, 30) : 'Новый чат',
                    timestamp: c.createdAt
                }));
            }
        }

        // Инициализация
        const chatManager = new ChatManager();

        // Конфигурация API
        const API_BASE_URL = '/api';
        const API_ENDPOINTS = {
            analyze: `${API_BASE_URL}/analyze-code/`,
            chat: `${API_BASE_URL}/chat/`,
            health: `${API_BASE_URL}/health/`
        };

        let currentLanguage = 'python';
        let isTyping = false;

        // Языки и расширения
        const languageExtensions = {
            python: 'main.py',
            javascript: 'script.js',
            java: 'Main.java',
            cpp: 'main.cpp'
        };

        // Примеры кода
        const codeExamples = {
            python: `def calculate_average(numbers):
    """Вычисляет среднее значение списка чисел"""
    total = 0
    for num in numbers:
        total += num
    return total / len(numbers)

# Пример использования
data = [1, 2, 3, 4, 5]
result = calculate_average(data)
print(f"Среднее значение: {result}")`,

            javascript: `function calculateAverage(numbers) {
    // Вычисляет среднее значение массива чисел
    let total = 0;
    for (let i = 0; i < numbers.length; i++) {
        total += numbers[i];
    }
    return total / numbers.length;
}

// Пример использования
const data = [1, 2, 3, 4, 5];
const result = calculateAverage(data);
console.log(\`Среднее значение: \${result}\`);`,

            java: `public class AverageCalculator {
    public static double calculateAverage(int[] numbers) {
        int total = 0;
        for (int num : numbers) {
            total += num;
        }
        return (double) total / numbers.length;
    }

    public static void main(String[] args) {
        int[] data = {1, 2, 3, 4, 5};
        double result = calculateAverage(data);
        System.out.println("Среднее значение: " + result);
    }
}`,

            cpp: `#include <iostream>
#include <vector>
using namespace std;

double calculateAverage(vector<int> numbers) {
    int total = 0;
    for (int num : numbers) {
        total += num;
    }
    return (double) total / numbers.size();
}

int main() {
    vector<int> data = {1, 2, 3, 4, 5};
    double result = calculateAverage(data);
    cout << "Среднее значение: " << result << endl;
    return 0;
}`
        };

        // DOM элементы
        const chatListEl = document.getElementById('chatList');
        const chatMessagesEl = document.getElementById('chatMessages');
        const currentChatNameEl = document.getElementById('currentChatName');
        const codeEditor = document.getElementById('codeEditor');
        const filenameEl = document.getElementById('filename');

        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            initEventListeners();
            renderChatList();
            renderCurrentChat();
            checkBackendHealth();
        });

        function initEventListeners() {
            document.getElementById('newChatBtn').addEventListener('click', () => {
                const newChat = chatManager.createNewChat();
                renderChatList();
                renderCurrentChat();
                showNotification('Новый чат создан');
            });

            document.getElementById('switchChatBtn').addEventListener('click', () => {
                openChatModal();
            });

            document.getElementById('deleteChatBtn').addEventListener('click', () => {
                if (confirm('Удалить этот чат?')) {
                    const currentId = chatManager.currentChatId;
                    chatManager.deleteChat(currentId);
                    renderChatList();
                    renderCurrentChat();
                    showNotification('Чат удален');
                }
            });

            document.getElementById('analyzeCodeBtn').addEventListener('click', analyzeCode);
            document.getElementById('attachCodeBtn').addEventListener('click', attachCodeToMessage);
            document.getElementById('clearCodeBtn').addEventListener('click', () => {
                codeEditor.value = '';
                updateCurrentChatCode();
                showNotification('Код очищен');
            });
            document.getElementById('sendBtn').addEventListener('click', sendMessage);

            // Языки
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const lang = btn.dataset.lang;
                    switchLanguage(lang);
                });
            });

            // Модальное окно
            document.getElementById('closeModalBtn').addEventListener('click', closeModal);
            document.getElementById('cancelModalBtn').addEventListener('click', closeModal);
            document.getElementById('chatModal').addEventListener('click', (e) => {
                if (e.target === document.getElementById('chatModal')) closeModal();
            });

            // Редактор
            codeEditor.addEventListener('input', updateCurrentChatCode);
        }

        function switchLanguage(lang) {
            currentLanguage = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.lang === lang) btn.classList.add('active');
            });
            filenameEl.innerText = languageExtensions[lang] || 'code.txt';

            const currentChat = chatManager.getCurrentChat();
            if (currentChat && !codeEditor.value.trim()) {
                codeEditor.value = codeExamples[lang] || '';
                updateCurrentChatCode();
            }
        }

        function updateCurrentChatCode() {
            const currentChat = chatManager.getCurrentChat();
            if (currentChat) {
                chatManager.updateCode(currentChat.id, codeEditor.value, currentLanguage);
            }
        }

        function renderChatList() {
            const chats = chatManager.getChatsList();
            chatListEl.innerHTML = chats.map(chat => `
                <div class="chat-item ${chat.id === chatManager.currentChatId ? 'active' : ''}" onclick="switchToChat('${chat.id}')">
                    <div class="chat-name">
                        <span>${escapeHtml(chat.name)}</span>
                        <span class="chat-time">${formatTime(chat.timestamp)}</span>
                    </div>
                    <div class="chat-preview">${escapeHtml(chat.preview)}</div>
                </div>
            `).join('');
        }

        function renderCurrentChat() {
            const chat = chatManager.getCurrentChat();
            if (!chat) return;

            currentChatNameEl.innerText = chat.name;
            currentLanguage = chat.language || 'python';
            codeEditor.value = chat.code || codeExamples[currentLanguage] || '';

            // Обновляем активную кнопку языка
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.lang === currentLanguage) btn.classList.add('active');
            });
            filenameEl.innerText = languageExtensions[currentLanguage] || 'code.txt';

            // Рендерим сообщения
            chatMessagesEl.innerHTML = chat.messages.map(msg => `
                <div class="message ${msg.role === 'user' ? 'user' : ''}">
                    <div class="message-avatar">${msg.role === 'user' ? '👤' : '🤖'}</div>
                    <div class="message-content">
                        ${formatMessageContent(msg.content)}
                        <div class="message-time">${formatTime(msg.timestamp)}</div>
                    </div>
                </div>
            `).join('');

            scrollToBottom();
        }

        function formatMessageContent(content) {
            let formatted = escapeHtml(content);
            formatted = formatted.replace(/```(\w+)?\n([\s\S]*?)```/g, (match, lang, code) => {
                return `<pre><code>${code.trim()}</code></pre>`;
            });
            formatted = formatted.replace(/\n/g, '<br>');
            return formatted;
        }

        function switchToChat(chatId) {
            const chat = chatManager.switchChat(chatId);
            if (chat) {
                renderChatList();
                renderCurrentChat();
                closeModal();
            }
        }

        async function analyzeCode() {
            const code = codeEditor.value.trim();
            if (!code) {
                showNotification('Введите код для анализа', 'error');
                return;
            }

            const btn = document.getElementById('analyzeCodeBtn');
            setButtonLoading(btn, true);

            const message = `🔍 Проанализируй этот код на ${getLanguageName(currentLanguage)}:\n\n\`\`\`${currentLanguage}\n${code}\n\`\`\``;
            addMessageToCurrentChat('user', message);

            await sendToAI(message);
            setButtonLoading(btn, false);
        }

        async function attachCodeToMessage() {
            const code = codeEditor.value.trim();
            if (!code) {
                showNotification('Нет кода для прикрепления', 'error');
                return;
            }

            const message = `Вот код на ${getLanguageName(currentLanguage)}:\n\n\`\`\`${currentLanguage}\n${code}\n\`\`\``;
            addMessageToCurrentChat('user', message);
            await sendToAI(message);
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;

            addMessageToCurrentChat('user', message);
            input.value = '';
            await sendToAI(message);
        }

        async function sendToAI(message) {
            showTypingIndicator();

            const currentChat = chatManager.getCurrentChat();
            const codeContext = currentChat?.code || '';

            try {
                const response = await fetch(API_ENDPOINTS.chat, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCsrfToken()
                    },
                    body: JSON.stringify({
                        message: message,
                        chat_id: currentChat?.id,
                        code_context: codeContext,
                        language: currentLanguage
                    })
                });

                if (!response.ok) throw new Error('Ошибка запроса');

                const data = await response.json();
                removeTypingIndicator();
                addMessageToCurrentChat('assistant', data.response || 'Извините, не удалось получить ответ');

            } catch (error) {
                console.error('Error:', error);
                removeTypingIndicator();
                addMessageToCurrentChat('assistant', '❌ Извините, произошла ошибка. Попробуйте позже.');
                showNotification('Ошибка связи с сервером', 'error');
            }
        }

        function addMessageToCurrentChat(role, content) {
            const currentChat = chatManager.getCurrentChat();
            if (currentChat) {
                const message = {
                    id: Date.now(),
                    role: role,
                    content: content,
                    timestamp: new Date()
                };
                chatManager.addMessage(currentChat.id, message);
                renderCurrentChat();
            }
        }

        function showTypingIndicator() {
            if (isTyping) return;
            isTyping = true;

            const typingDiv = document.createElement('div');
            typingDiv.className = 'message';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;
            chatMessagesEl.appendChild(typingDiv);
            scrollToBottom();
        }

        function removeTypingIndicator() {
            isTyping = false;
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        function openChatModal() {
            const modal = document.getElementById('chatModal');
            const chatListModal = document.getElementById('chatListModal');
            const chats = chatManager.getChatsList();

            chatListModal.innerHTML = chats.map(chat => `
                <div class="chat-item-modal" onclick="switchToChat('${chat.id}')">
                    <div class="chat-name-modal">${escapeHtml(chat.name)}</div>
                    <div class="chat-preview-modal">${escapeHtml(chat.preview)}</div>
                </div>
            `).join('');

            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('chatModal').classList.remove('active');
        }

        async function checkBackendHealth() {
            const statusSpan = document.getElementById('connectionStatus');
            try {
                const response = await fetch(API_ENDPOINTS.health);
                if (response.ok) {
                    statusSpan.innerHTML = '✅ Сервер готов';
                } else {
                    statusSpan.innerHTML = '⚠️ Ошибка';
                }
            } catch (error) {
                statusSpan.innerHTML = '❌ Нет соединения';
            }
        }

        function getLanguageName(lang) {
            const names = { python: 'Python', javascript: 'JavaScript', java: 'Java', cpp: 'C++' };
            return names[lang] || lang;
        }

        function getCsrfToken() {
            return document.querySelector('[name=csrf-token]')?.content || '';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(date) {
            const d = new Date(date);
            return d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        }

        function scrollToBottom() {
            chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
        }

        function setButtonLoading(btn, isLoading) {
            if (isLoading) {
                btn.disabled = true;
                btn.innerHTML = '<span class="loading-spinner"></span> Анализ...';
            } else {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-brain"></i> Анализировать';
            }
        }

        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.style.borderLeftColor = type === 'success' ? '#4ade80' : '#ef4444';
            notification.innerHTML = `
                <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i>
                ${escapeHtml(message)}
            `;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // Глобальные функции для onclick
        window.switchToChat = switchToChat;
    </script>
</body>
</html>
