<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Письмо отправлено - FixMate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h3>Проверьте вашу почту</h3>
                    </div>
                    <div class="card-body">
                        <p>Мы отправили инструкции по восстановлению пароля на указанный email.</p>
                        <p>Если вы не получили письмо, убедитесь, что ввели правильный адрес, и проверьте папку "Спам".</p>
                        <a href="{% url 'user:login' %}" class="btn btn-primary">Вернуться на страницу входа</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
